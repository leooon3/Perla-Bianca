<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="review_page_title">Lascia una Recensione - Perla Bianca</title>
    <meta name="description" content="Hai soggiornato a Perla Bianca? Lascia una recensione e condividi la tua esperienza." />
    <meta name="robots" content="noindex, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://isarcofagidelre.it/perla-bianca/lascia-recensione.html" />
    <meta property="og:title" content="Lascia una Recensione — Perla Bianca" />
    <meta property="og:description" content="Hai soggiornato a Perla Bianca? Lascia una recensione e condividi la tua esperienza." />
    <link rel="canonical" href="https://isarcofagidelre.it/perla-bianca/lascia-recensione.html" />
    <link rel="icon" href="../img/logo.ico" type="image/ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/property.css" />
    <style>
      .review-page-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--ivory);
        font-family: 'Inter', sans-serif;
      }
      .review-header-back {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        transition: color 0.2s;
      }
      .review-header-back:hover { color: #fff; }
      .review-header-back span { transition: transform 0.2s; }
      .review-header-back:hover span { transform: translateX(-3px); }
      .review-header-brand {
        font-family: 'Playfair Display', serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: rgba(255,255,255,0.7);
        letter-spacing: 0.05em;
      }
      .review-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.25rem;
      }
      .review-card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 8px 40px rgba(27,58,92,0.10);
        border: 1px solid rgba(27,58,92,0.08);
        padding: 2.5rem 2rem;
      }
      @media (min-width: 480px) { .review-card { padding: 3rem 2.5rem; } }
      .review-card-header { text-align: center; margin-bottom: 2.25rem; }
      .review-card-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 0.5rem;
      }
      .review-card-header p {
        font-size: 0.92rem;
        color: #7a8a9a;
      }
      .review-label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
        opacity: 0.7;
      }
      .review-input {
        width: 100%;
        padding: 0.8rem 1rem;
        border-radius: 0.6rem;
        border: 1.5px solid rgba(27,58,92,0.18);
        background: var(--ivory);
        color: var(--navy);
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
      }
      .review-input::placeholder { color: rgba(27,58,92,0.35); }
      .review-input:focus {
        border-color: var(--terracotta);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(196,98,45,0.1);
      }
      textarea.review-input { resize: vertical; min-height: 120px; }
      .review-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .review-field { margin-bottom: 1.25rem; }
      .review-stars {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        padding: 1rem;
        background: var(--ivory);
        border-radius: 0.75rem;
        border: 1.5px dashed rgba(27,58,92,0.2);
        transition: border-color 0.2s;
        cursor: pointer;
      }
      .review-stars:hover { border-color: var(--terracotta); }
      .star {
        font-size: 2.25rem;
        color: #d1d5db;
        transition: transform 0.15s, color 0.15s;
        cursor: pointer;
      }
      .star:hover, .star.active { color: #f59e0b; transform: scale(1.2); }
      .review-btn {
        width: 100%;
        padding: 1rem;
        border-radius: 0.75rem;
        background: var(--terracotta);
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(196,98,45,0.3);
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        margin-top: 0.75rem;
      }
      .review-btn:hover {
        background: var(--terracotta-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(196,98,45,0.35);
      }
      .review-btn:active { transform: scale(0.98); }
      .review-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
      #reviewFormStatus {
        display: none;
        text-align: center;
        font-size: 0.88rem;
        font-weight: 500;
        margin-top: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 0.6rem;
      }
      #reviewFormStatus.success {
        background: rgba(16,185,129,0.1);
        color: #065f46;
        border: 1px solid rgba(16,185,129,0.25);
      }
      #reviewFormStatus.error {
        background: rgba(196,98,45,0.08);
        color: var(--terracotta);
        border: 1px solid rgba(196,98,45,0.2);
      }
      .review-footer {
        text-align: center;
        padding: 1.5rem;
        font-size: 0.78rem;
        color: rgba(27,58,92,0.4);
        font-family: 'Inter', sans-serif;
      }
      .review-footer .footer-lang button { color: rgba(27,58,92,0.35); }
      .review-footer .footer-lang button:hover { color: var(--navy); }
      .review-footer .footer-lang span { color: rgba(27,58,92,0.15); }
    </style>
  </head>
  <body class="review-page-wrap">

    <header class="site-header">
      <a href="index.html" class="review-header-back">
        <span>←</span>
        <span data-i18n="review_back_home">Torna alla Home</span>
      </a>
      <span class="review-header-brand">Perla Bianca</span>
    </header>

    <main class="review-main">
      <div class="review-card">
        <div class="review-card-header">
          <h1 data-i18n="review_form_title">La tua opinione conta</h1>
          <p data-i18n="review_form_subtitle">Ci auguriamo tu abbia passato un soggiorno indimenticabile.</p>
        </div>

        <form id="internalReviewForm">
          <div class="review-field">
            <label class="review-label" data-i18n="review_label_name">Nome e Cognome</label>
            <input
              type="text"
              name="nome"
              required
              placeholder="Es. Mario Rossi"
              data-i18n-placeholder="review_placeholder_name"
              class="review-input"
            />
          </div>

          <div class="review-field">
            <label class="review-label" data-i18n="review_label_stay">Periodo di soggiorno</label>
            <div class="review-dates">
              <div>
                <label class="review-label" data-i18n="review_label_from" style="margin-bottom:0.4rem;">Dal</label>
                <input type="date" name="data_arrivo" required class="review-input" />
              </div>
              <div>
                <label class="review-label" data-i18n="review_label_to" style="margin-bottom:0.4rem;">Al</label>
                <input type="date" name="data_partenza" required class="review-input" />
              </div>
            </div>
          </div>

          <div class="review-field">
            <label class="review-label" data-i18n="review_label_rating">Valutazione</label>
            <input type="hidden" name="voto" id="votoInput" value="" required />
            <div class="review-stars" id="starContainer">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
          </div>

          <div class="review-field">
            <label class="review-label" data-i18n="review_label_message">La tua esperienza</label>
            <textarea
              name="messaggio"
              rows="4"
              required
              placeholder="Cosa ti è piaciuto di più? Consiglieresti la casa?"
              data-i18n-placeholder="review_placeholder_message"
              class="review-input"
            ></textarea>
          </div>

          <button type="submit" id="submitReviewBtn" class="review-btn" data-i18n="review_btn_submit">
            Pubblica Recensione
          </button>

          <div id="reviewFormStatus"></div>
        </form>
      </div>
    </main>

    <footer class="review-footer" style="display:flex; flex-direction:column; align-items:center; gap:0.75rem;">
      <span data-i18n="footer_copyright_simple">© 2025 Perla Bianca Casa Vacanze</span>
      <div class="footer-lang">
        <button onclick="changeLanguage('it')" title="Italiano">IT</button>
        <span aria-hidden="true">|</span>
        <button onclick="changeLanguage('en')" title="English">EN</button>
        <span aria-hidden="true">|</span>
        <button onclick="changeLanguage('fr')" title="Français">FR</button>
        <span aria-hidden="true">|</span>
        <button onclick="changeLanguage('de')" title="Deutsch">DE</button>
        <span aria-hidden="true">|</span>
        <button onclick="changeLanguage('es')" title="Español">ES</button>
      </div>
    </footer>

    <script type="module" src="../js/main.js"></script>
  </body>
</html>
